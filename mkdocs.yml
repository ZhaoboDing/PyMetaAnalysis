site_name: PyMetaAnalysis
site_description: Pandas-first, auditable meta-analysis workflows for Python
site_url: https://zhaoboding.github.io/PyMetaAnalysis/
repo_url: https://github.com/ZhaoboDing/PyMetaAnalysis
repo_name: ZhaoboDing/PyMetaAnalysis
edit_uri: edit/main/docs/
strict: true

theme:
  name: mkdocs
  locale: en
  highlightjs: true

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

nav:
  - Home: index.md
  - Start:
      - Installation: installation.md
      - Getting started: getting-started.md
      - Input data and row decisions: guides/input-data.md
  - Guides:
      - Generic effects: guides/generic-effects.md
      - Binary outcomes: guides/binary-outcomes.md
      - Continuous outcomes: guides/continuous-outcomes.md
      - Meta-regression: guides/meta-regression.md
      - Zero-event studies: guides/zero-events.md
      - Sensitivity analysis: guides/sensitivity-analysis.md
      - Plotting: guides/plotting.md
      - Provenance and reporting: guides/provenance-reporting.md
      - Mapping R workflows: guides/r-interoperability.md
  - Methods:
      - Choosing methods: guides/method-selection.md
      - Statistical methods: methods/statistical-methods.md
      - Validation strategy: validation.md
      - Scope and limitations: limitations.md
  - Reference:
      - Public API: reference/api.md
      - Result objects: reference/results.md
      - Report and provenance schemas: reference/report-schema.md
      - Project:
          - Citing PyMetaAnalysis: citation.md
          - Development and contribution: development.md
          - Release process: releasing.md
          - Decisions:
              - Optional Matplotlib: adr/0001-optional-matplotlib.md
              - Statistical defaults and boundary policies: adr/0002-statistical-policy.md
              - Meta-regression prediction intervals: adr/0003-meta-regression-prediction-intervals.md
