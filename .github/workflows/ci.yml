name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run tests with branch coverage
        run: python -m pytest --cov=meta_analyze --cov-branch --cov-report=term-missing

  quality:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,plot]"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

  build:
    name: Build and inspect distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Verify private and generated files are not distributed
        shell: python
        run: |
          from pathlib import Path, PurePosixPath
          import tarfile
          import zipfile

          artifacts = list(Path("dist").iterdir())
          assert any(path.suffix == ".whl" for path in artifacts)
          assert any(path.name.endswith(".tar.gz") for path in artifacts)

          for artifact in artifacts:
              if artifact.suffix == ".whl":
                  with zipfile.ZipFile(artifact) as archive:
                      names = archive.namelist()
              elif artifact.name.endswith(".tar.gz"):
                  with tarfile.open(artifact, "r:gz") as archive:
                      names = archive.getnames()
              else:
                  continue

              assert all(
                  PurePosixPath(name).name != "DESIGN.md" for name in names
              ), f"DESIGN.md unexpectedly included in {artifact}"
              assert all(
                  "site" not in PurePosixPath(name).parts for name in names
              ), f"generated site unexpectedly included in {artifact}"

      - name: Smoke test the installed wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import importlib.metadata

          import meta_analyze as ma

          result = ma.meta_analysis(
              effect=[1.0, 2.0, 3.0],
              variance=[1.0, 1.0, 1.0],
              model="common",
          )
          assert result.k == 3
          assert result.estimate == 2.0
          print(importlib.metadata.version("PyMetaAnalysis"))
          PY
