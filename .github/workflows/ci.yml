name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run tests with branch coverage
        run: python -m pytest --cov=meta_analyze --cov-branch --cov-report=term-missing

  minimum-dependencies:
    name: Minimum direct dependencies (Python 3.10)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install declared lower bounds
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "numpy==1.24.0" \
            "pandas==2.0.0" \
            "scipy==1.10.0" \
            "hypothesis==6.100.0" \
            "matplotlib==3.7.0" \
            "pytest==8.0.0" \
            "pytest-cov==5.0.0"
          python -m pip install --no-deps --editable .

      - name: Report resolved dependency versions
        run: |
          python -m pip list
          python -m pip check

      - name: Run tests at declared lower bounds
        run: python -m pytest --cov=meta_analyze --cov-branch --cov-report=term-missing

  quality:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,plot]"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Validate GitHub Actions workflows
        run: actionlint

      - name: Type check
        run: python -m mypy

      - name: Check release metadata consistency
        run: python tools/check_release.py

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[docs,notebook]"

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Execute example notebooks
        run: python tools/execute_notebooks.py

  build:
    name: Build and inspect distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Verify distribution contents
        run: python tools/inspect_distribution.py dist

      - name: Smoke test the installed wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import importlib.metadata

          import meta_analyze as ma

          result = ma.meta_analysis(
              effect=[1.0, 2.0, 3.0],
              variance=[1.0, 1.0, 1.0],
              model="common",
          )
          assert result.k == 3
          assert result.estimate == 2.0
          print(importlib.metadata.version("PyMetaAnalysis"))
          PY
